<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEA — Hakuna Mtandao</title>
  <meta name="theme-color" content="#05060a">
  <style>
    body {
      background-color: #05060a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #ffffff;
      margin-bottom: 24px;
    }
    .accent {
      color: #F5A623;
    }
    .message {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 16px;
      padding: 0 20px;
    }
    .sub-message {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 40px;
      padding: 0 20px;
    }
    .btn {
      background-color: #F5A623;
      color: #05060a;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 40px;
      text-decoration: none;
      display: inline-block;
    }
    .cached-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
    }
    .link-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px 24px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="logo">STE<span class="accent">A</span></div>
  <div class="message">Hakuna Mtandao — Tafadhali angalia muunganisho wako</div>
  <div class="sub-message">Unaweza kujaribu kurudisha ukurasa, au tembelea kurasa zilizohifadhiwa hapo chini.</div>
  
  <button class="btn" onclick="window.location.reload()">Jaribu Tena</button>

  <div class="cached-links">
    <a href="/student" class="link-card">Student Center</a>
    <a href="/duka/phones" class="link-card">Marketplace</a>
    <a href="/tech-hub" class="link-card">Tech Hub</a>
  </div>
</body>
</html>
